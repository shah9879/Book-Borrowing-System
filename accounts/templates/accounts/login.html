{% extends 'base.html' %}
{% block title %}Login | BookShare{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] border border-slate-200 shadow-2xl overflow-hidden">
        
        <div class="bg-emerald-600 p-8 text-center text-white">
            <div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/30">
                <i class="fa-solid fa-lock-open text-2xl"></i>
            </div>
            <h2 class="text-2xl font-black tracking-tight">Welcome Back</h2>
            <p class="text-emerald-100 text-sm font-medium mt-1">Login to access your bookshelf</p>
        </div>

        <form method="POST" class="p-8 md:p-10 space-y-6">
            {% csrf_token %}

            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Username</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                        <i class="fa-solid fa-user text-sm"></i>
                    </span>
                    <input type="text" name="username" required
                           class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all font-medium text-slate-700"
                           placeholder="Enter your username">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Password</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-emerald-500 transition-colors">
                        <i class="fa-solid fa-key text-sm"></i>
                    </span>
                    <input type="password" name="password" required
                           class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all font-medium text-slate-700"
                           placeholder="••••••••">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" 
                        class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-emerald-700 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl shadow-emerald-100 flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </div>
        </form>

        <div class="bg-slate-50 p-6 text-center border-t border-slate-100">
            <p class="text-slate-500 text-sm font-medium">
                Don't have an account? 
                <a href="{% url 'register' %}" class="text-emerald-600 font-bold hover:underline ml-1">Create one now</a>
            </p>
        </div>
    </div>
    
    <a href="{% url 'browse_books' %}" class="mt-8 text-slate-400 text-sm font-bold hover:text-slate-600 transition-colors">
        <i class="fa-solid fa-chevron-left mr-2"></i> Back to Browse
    </a>
</div>
{% endblock %}
