{% extends 'base.html' %}
{% block content %}

<div style="max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-top: 4px solid #f44336;">
    <h2 style="color: #f44336;">⚠️ Delete Book</h2>
    
    <div style="background: #fff3cd; padding: 15px; border-radius: 5px; border-left: 4px solid #ffc107; margin: 20px 0;">
        <p style="margin: 0;"><strong>Warning:</strong> This action cannot be undone!</p>
    </div>
    
    <p style="font-size: 16px; margin: 20px 0;">
        Are you sure you want to delete <strong>"{{ book.title }}"</strong> by {{ book.author }}?
    </p>
    
    {% if book.cover_image %}
        <img src="{{ book.cover_image.url }}" alt="{{ book.title }}" style="max-width: 150px; border-radius: 5px; margin: 10px 0;">
    {% endif %}
    
    <form method="POST" style="margin-top: 20px;">
        {% csrf_token %}
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="flex: 1; padding: 12px; background: #f44336; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                🗑️ Yes, Delete
            </button>
            <a href="{% url 'my_books' %}" style="flex: 1; padding: 12px; background: #9E9E9E; color: white; text-align: center; text-decoration: none; border-radius: 5px; font-weight: bold;">
                Cancel
            </a>
        </div>
    </form>
</div>

{% endblock %}
