{% extends 'base.html' %}
{% block content %}

<div style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h2>✏️ Edit Book: {{ book.title }}</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            {{ form.as_p }}
        </div>
        
        <!-- Show current cover if exists -->
        {% if book.cover_image %}
            <div style="margin-bottom: 20px;">
                <p><strong>Current Cover:</strong></p>
                <img src="{{ book.cover_image.url }}" alt="{{ book.title }}" style="max-width: 200px; border: 1px solid #ddd; border-radius: 5px;">
                <p style="font-size: 12px; color: #666;">Upload a new image to replace it</p>
            </div>
        {% elif book.cover_url %}
            <div style="margin-bottom: 20px;">
                <p><strong>Current Cover (URL):</strong></p>
                <img src="{{ book.cover_url }}" alt="{{ book.title }}" style="max-width: 200px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
        {% endif %}
        
        <button type="submit" style="width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer;">
            ✓ Update Book
        </button>
    </form>
    
    <br>
    <a href="{% url 'my_books' %}">← Back to My Books</a>
</div>

<style>
    input[type="text"], 
    input[type="url"], 
    input[type="file"], 
    textarea, 
    select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
    }
    
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
    }
</style>

{% endblock %}
